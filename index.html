<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校内デジタル相談システム - ことりポート</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script>
        // 1. 【あなたの設定に書き換えてね】GASのURL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyryJ7GCffCrC2Ifi1n6icntM1HHYwmkJ-e5g-YbnY9qCBbX2IMGSRRlEj8xeV6vdtiww/exec";

        // 2. 【あなたの設定に書き換えてね】Firebaseの設定値（Config）
        const firebaseConfig = {
            apiKey: "AIzaSyDq6RYWHWAJbH5crNWTN-Ovt3NDfEPr0SM",
            authDomain: "cotori-port-22309.firebaseapp.com",
            projectId: "cotori-port-22309",
            storageBucket: "cotori-port-22309.firebasestorage.app",
            messagingSenderId: "202445772803",
            appId: "1:202445772803:web:e6aa788cd3774083c19636"// ここにゲットした apiKey や authDomain などの塊を丸ごと貼り付けてください
        };
        
        // Firebaseの初期化
        let auth, googleProvider;
        try {
            firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            googleProvider = new firebase.auth.GoogleAuthProvider();
        } catch (e) {
            console.error("Firebase初期化エラー:", e);
        }
    </script>
</head>
<body>

    <div class="bg-image"></div>

    <div id="entrance-screen">
        <h1 class="welcome-title">ことりポート</h1>
        <p style="color: white; font-weight: bold; text-shadow: 1px 1px 5px rgba(0,0,0,0.4); margin-top: 10px; font-family: 'Kiwi Maru', serif; margin-bottom: 30px;">秘密基地への入り口</p>
        
        <div style="display: flex; flex-direction: column; gap: 20px; width: 85%; max-width: 320px;">
            <button class="enter-btn" onclick="loginAsStudent()" style="margin: 0; width: 100%; background: #b8e8d2;">生徒の入り口 🍃</button>
            <button class="enter-btn" onclick="loginAsTeacherDirect()" style="margin: 0; width: 100%; background: #fff4bd;">先生の入り口 🌳</button>
        </div>
    </div>

    <div id="main-app">
        <header class="app-header">
            <div class="header-titles">
                <h1>ことりポート</h1>
            </div>
            <button class="hamburger-btn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
        </header>

        <div id="menuOverlay" class="menu-overlay" onclick="toggleMenu()"></div>

        <nav id="sideMenu" class="side-menu">
            <div class="menu-item active" id="tab0" onclick="switchView(0)"> 📮 つぶやく</div>
            <div class="menu-item" id="tab1" onclick="switchView(1)">👀 みんなのつぶやき</div>
            <div class="menu-item" id="tab2" onclick="switchView(2)" style="margin-top: 20px;">🔒 先生のお部屋</div>
        </nav>

        <div class="main-board-container">
            <img src="harinezumi.png" class="bottom-right-hedgehog" alt="ハリネズミ">
            <h2 class="board-plain-title" id="boardTitle">つぶやく</h2>

            <main class="view-panel active" id="panel0">
                <div id="studentLoginBadge" style="background: #f0fdf4; border: 2px solid #b8e8d2; padding: 12px; border-radius: 15px; margin-bottom: 20px; font-size: 14px; font-weight: bold; text-align: center; color: var(--main-wood);">
                    👤 ログイン中: 読み込み中...
                </div>

                <div class="type-selector">
                    <div class="type-box selected" id="typeConsult" onclick="setPostType('consult')">🌳 先生につぶやく</div>
                    <div class="type-box" id="typeTsubuyaki" onclick="setPostType('tsubuyaki')">🍃 ひとりごと</div>
                </div>

                <div id="nameOption" style="margin-bottom: 25px; display: flex; gap: 12px;">
                    <button id="anonBtn" class="toggle-3d-btn active" onclick="setMode('anon')">ひみつ（匿名）で送る</button>
                    <button id="realBtn" class="toggle-3d-btn" onclick="setMode('real')">名前を出す</button>
                </div>

                <form onsubmit="submitForm(event)">
                    <div id="nameInputGroup" style="display:none; background: #fffde7; padding: 12px; border-radius: 15px; border: 2px dashed #ffd166; margin-bottom: 20px; font-size: 13px; text-align: center; color: #7f8c8d;">
                        💡 <strong>「名前を出す」</strong> を選んだので、ログイン中のあなたのお名前で先生に届きます。
                    </div>

                    <div class="form-group" id="receiverGroup">
                        <label>届ける先生（だれに届ける？複数でもOK）</label>
                        <div id="accordionContainer"></div>
                    </div>

                    <div class="form-group">
                        <label>いまのきもち（つぶやき）</label>
                        <div class="notebook-lines-container">
                            <textarea id="message" placeholder="今のつらさや、ただ聞いてほしいこと、なんでも自由に書いてね。" required></textarea>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">先生に届ける ✨</button>
                </form>
            </main>

            <div class="view-panel" id="panel1">
                <p style="text-align: center; color: #888; font-size: 13px; margin-bottom: 25px; font-family: 'Kiwi Maru', serif;">だれが書いたかはわからないようになっています 🍃</p>
                <div id="studentBoard">読み込み中...</div>
            </div>

            <div class="view-panel" id="panel2">
                <div id="loginSection" class="login-box" style="text-align: center; padding: 20px 0;">
                    <h2 style="color: var(--main-wood); font-size: 18px; font-family: 'Kiwi Maru', serif; margin-bottom: 20px;">🔑 先生専用ログイン</h2>
                    <p style="font-size: 13px; color: #666; margin-bottom: 25px;">学校から配られたGoogleアカウントでログインできます。</p>
                    <button class="submit-btn" onclick="loginAsTeacherDirect()" style="background: white; border: 2px solid var(--main-wood); font-size: 15px;">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G" style="width:18px; vertical-align:middle; margin-right:8px;"> Googleアカウントでログイン
                    </button>
                </div>
                
                <div id="teacherSection" style="display:none;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:20px; align-items: center;">
                        <strong id="loggedInTeacherName" style="color: var(--main-wood); font-family: 'Kiwi Maru', serif;">🔒 受信箱</strong>
                        <button onclick="logout()" style="border:none; background:none; text-decoration:underline; cursor:pointer; font-size:13px; color:#888;">ログアウト</button>
                    </div>
                    
                    <div style="display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ecdcc9; padding-bottom: 10px;">
                        <button id="subTabInbox" onclick="switchTeacherSubTab('inbox')" style="flex:1; padding:10px; border:none; background:#ecdcc9; border-radius:10px; font-weight:bold; cursor:pointer;">📥 届いたつぶやき</button>
                        <button id="subTabAdmin" onclick="switchTeacherSubTab('admin')" style="flex:1; padding:10px; border:none; background:#f5eee6; border-radius:10px; font-weight:bold; cursor:pointer;">⚙️ 生徒・先生の管理設定</button>
                    </div>

                    <div id="teacherSubPanelInbox">
                        <div id="teacherBoard"></div>
                    </div>

                    <div id="teacherSubPanelAdmin" style="display:none;">
                        <div style="background: #fffdf4; padding: 20px; border-radius: 20px; border: 3px dashed #c7b9ff;">
                            <h3 style="font-size: 14px; margin-top: 0; color: var(--main-wood); font-family: 'Kiwi Maru', serif;">📁 Excelデータ（CSV）から一括登録</h3>
                            <div class="form-group" style="margin-bottom: 15px;">
                                <label style="font-size: 12px; margin-bottom: 5px;">👤 全校生徒の名簿（CSV）</label>
                                <input type="file" id="studentCsvFile" accept=".csv" onchange="uploadStudentCsv()" style="font-size: 12px; padding: 8px;">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 4px;">
                                    <span id="studentCountBadge" style="font-size: 11px; color: #27ae60; font-weight: bold;">現在登録されている生徒: 0人</span>
                                    <button onclick="clearStudentData()" style="background: #ffcbd1; color: #c0392b; border: none; padding: 3px 8px; border-radius: 5px; font-size: 10px; cursor: pointer; font-weight: bold;">🗑️ 生徒データを全削除</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="careModal">
        <div class="modal-content">
            <h3 style="color: var(--main-wood); margin-top:0; font-family: 'Kiwi Maru', serif;">そっと受け取りました 🪽</h3>
            <button class="submit-btn" onclick="closeModal()">秘密基地へ戻る</button>
        </div>
    </div>

    <script>
        let currentMode = 'anon';
        let currentPostType = 'consult';
        let currentLoggedInTeacher = null;
        let currentLoggedInStudentName = "ゲスト生徒"; 
        let studentMasterList = [];
        let teachers = [];
        let posts = [];
        const titleNames = ["つぶやく", "掲示板", "先生のお部屋"];

        // 🌟 画面が戻ってきたときに、ログインに成功したかチェックする処理
        window.addEventListener('DOMContentLoaded', () => {
            if (!auth) return;
            
            // ログイン後の結果を受け取る
            auth.getRedirectResult().then((result) => {
                if (result.user) {
                    // ログイン成功時
                    const user = result.user;
                    currentLoggedInStudentName = user.displayName || "生徒";
                    document.getElementById('studentLoginBadge').innerText = `👤 ログイン中: ${currentLoggedInStudentName} さん`;
                    document.getElementById('tab2').style.display = 'none';
                    enterApp();
                }
            }).catch((error) => {
                console.error("Redirect Auth Error:", error);
                alert("Googleログインに失敗しました。\nエラーコード: " + error.code + "\n" + error.message);
            });
        });

        // 生徒用：リダイレクトでログイン画面へ飛ばす
        function loginAsStudent() {
            if (!auth) {
                alert("❌ FirebaseのConfigを設定してください。");
                return;
            }
            auth.signInWithRedirect(googleProvider);
        }

        // 先生用：リダイレクトでログイン画面へ飛ばす
        function loginAsTeacherDirect() {
            if (!auth) {
                alert("❌ FirebaseのConfigを設定してください。");
                return;
            }
            auth.signInWithRedirect(googleProvider);
        }

        async function loadCloudData() {
            try {
                if (GAS_URL.includes("ここにコピーしたGAS的URL")) return;
                const response = await fetch(`${GAS_URL}?action=getData`);
                const data = await response.json();
                posts = data.posts || [];
                teachers = data.teachers || [];
                studentMasterList = data.students || [];
                renderTeacherSelect(); 
                renderBoards();
            } catch (err) {
                console.error("データ取得失敗:", err);
            }
        }

        function enterApp() {
            document.getElementById('entrance-screen').classList.add('hide');
            const app = document.getElementById('main-app');
            app.style.display = 'flex';
            setTimeout(() => { app.classList.add('show'); }, 50);
            loadCloudData();
        }

        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('open');
            document.getElementById('menuOverlay').classList.toggle('show');
        }

        function switchView(index) {
            const panels = document.querySelectorAll('.view-panel');
            const items = document.querySelectorAll('.menu-item');
            panels.forEach(p => p.classList.remove('active'));
            items.forEach(t => t.classList.remove('active'));
            document.getElementById(`panel${index}`).classList.add('active');
            if(document.getElementById(`tab${index}`)) document.getElementById(`tab${index}`).classList.add('active');
            document.getElementById('boardTitle').innerText = titleNames[index];
            toggleMenu();
        }

        function setPostType(type) {
            currentPostType = type;
            document.getElementById('typeConsult').classList.toggle('selected', type === 'consult');
            document.getElementById('typeTsubuyaki').classList.toggle('selected', type === 'tsubuyaki');
            document.getElementById('receiverGroup').style.display = type === 'consult' ? 'block' : 'none';
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('anonBtn').classList.toggle('active', mode === 'anon');
            document.getElementById('realBtn').classList.toggle('active', mode === 'real');
            document.getElementById('nameInputGroup').style.display = mode === 'real' ? 'block' : 'none';
        }

        function renderTeacherSelect() {
            const container = document.getElementById('accordionContainer');
            if(!container) return; container.innerHTML = '';
            teachers.forEach(t => {
                container.innerHTML += `<label class="checkbox-label"><input type="checkbox" name="receiver" value="${t.name}"> ${t.name}</label>`;
            });
        }

        function renderBoards() {
            const sBoard = document.getElementById('studentBoard');
            if(!sBoard) return; sBoard.innerHTML = '';
            posts.forEach(post => {
                const sCard = document.createElement('div');
                sCard.className = 'post-card';
                sCard.innerHTML = `<div class="post-content">${post.content}</div>`;
                sBoard.appendChild(sCard);
            });
        }
    </script>
</body>
</html>
