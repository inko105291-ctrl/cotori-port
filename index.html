<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校内デジタル相談システム - ことりポート</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script>
        // 1. 【あなたの設定に書き換えてね】GASのURL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyryJ7GCffCrC2Ifi1n6icntM1HHYwmkJ-e5g-YbnY9qCBbX2IMGSRRlEj8xeV6vdtiww/exec";

        // 2. 【あなたの設定に書き換えてね】Firebaseの設定値（Config）
        const firebaseConfig = {
            apiKey: "AIzaSyDq6RYWHWAJbH5crNWTN-Ovt3NDfEPr0SM",
            authDomain: "cotori-port-22309.firebaseapp.com",
            projectId: "cotori-port-22309",
            storageBucket: "cotori-port-22309.firebasestorage.app",
            messagingSenderId: "202445772803",
            appId: "1:202445772803:web:e6aa788cd3774083c19636"// ここにゲットした apiKey や authDomain などの塊を丸ごと貼り付けてください
        };
        
        // Firebaseの初期化
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const googleProvider = new firebase.auth.GoogleAuthProvider();
    </script>
</head>
<body>

    <div class="bg-image"></div>

    <div id="entrance-screen">
        <h1 class="welcome-title">ことりポート</h1>
        <p style="color: white; font-weight: bold; text-shadow: 1px 1px 5px rgba(0,0,0,0.4); margin-top: 10px; font-size: 15px;">～校内デジタル相談室～</p>
        <button class="enter-btn" onclick="enterApp()">中に入る</button>
    </div>

    <div id="main-app">
        
        <header class="app-header">
            <div class="header-titles">
                <h1>ことりポート</h1>
            </div>
            <button class="hamburger-btn" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </header>

        <div id="menuOverlay" class="menu-overlay" onclick="toggleMenu()"></div>

        <nav id="sideMenu" class="side-menu">
            <div class="menu-item active" id="menu0" onclick="switchView(0)">つぶやく</div>
            <div class="menu-item" id="menu1" onclick="switchView(1)">先生のお返事</div>
            <div class="menu-item" id="menu2" onclick="switchView(2)">みんなの掲示板</div>
            <div class="menu-item" id="menuTeacher" onclick="switchView('teacher')" style="margin-top:auto; border-color:#c7b9ff; background:#faf6ee;">先生用管理画面</div>
            <div class="menu-item" onclick="handleLogout()" style="border-color:#ffccd5; background:#fffdfd; color:#cc3344;">ログアウト</div>
        </nav>

        <div class="app-content-wrapper">
            
            <div class="board-header-area">
                <img src="risu.png" class="top-left-squirrel" alt="リス">
                <div class="board-title-box">
                    <h2 class="board-plain-title" id="boardTitle">つぶやく</h2>
                </div>
            </div>

            <div class="main-board-container">
                <img src="harinezumi.png" class="bottom-right-hedgehog" alt="ハリネズミ">
                
                <main class="view-panel active" id="panel0">
                    <div class="form-group">
                        <label>どんな方法でつぶやく？</label>
                        <div class="type-selector">
                            <div class="type-box selected" id="typeSodan" onclick="selectPostType('sodan')">💬 せんせいに相談</div>
                            <div class="type-box" id="typeHitorigoto" onclick="selectPostType('hitorigoto')">🍃 ひとりごと(掲示板)</div>
                        </div>
                    </div>

                    <div class="form-group" id="teacherSelectGroup">
                        <label>だれに届ける？ (複数えらべるよ)</label>
                        <details class="rm-accordion">
                            <summary>先生をえらぶ</summary>
                            <div class="rm-accordion-content" id="studentViewTeacherList">
                                </div>
                        </details>
                    </div>

                    <div class="form-group">
                        <label>お名前はどうする？</label>
                        <div class="type-selector" style="gap: 10px;">
                            <button type="button" class="toggle-3d-btn active" id="nameTypeHimitsu" onclick="selectNameType('himitsu')">🔒 ひみつ(匿名)</button>
                            <button type="button" class="toggle-3d-btn" id="nameTypeReal" onclick="selectNameType('real')">👤 本名で送る</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>つぶやきたい内容</label>
                        <div class="notebook-lines-container">
                            <textarea id="postContent" placeholder="ここに自由に気持ちを書いてね..."></textarea>
                        </div>
                    </div>

                    <button class="submit-btn" onclick="submitPost()">🕊️ 先生に届ける</button>
                </main>

                <main class="view-panel" id="panel1">
                    <div id="personalReplyBoard" style="min-height:100px;">
                        </div>
                </main>

                <main class="view-panel" id="panel2">
                    <div id="publicTimelineBoard" style="min-height:100px;">
                        </div>
                </main>

                <main class="view-panel" id="panelTeacher">
                    <div style="background:#fff; border:2px solid #c7b9ff; padding:15px; border-radius:20px; margin-bottom:20px; font-size:14px;">
                        <span style="font-weight:bold; color:#4a3b32;">🔑 先生ログイン中: </span>
                        <span id="teacherNameDisplay" style="color:#666;">---</span>
                    </div>
                    <div id="teacherManagementBoard">
                        </div>
                </main>

            </div> </div> </div> <div id="customModal" class="modal">
        <div class="modal-content">
            <p id="modalMessage" style="font-weight:bold; font-size:16px; color:#4a3b32; line-height:1.6; margin-bottom:20px; white-space:pre-wrap;">メッセージ</p>
            <button class="submit-btn" onclick="closeModal()" style="padding:10px 20px; font-size:14px; width:auto;">閉じる</button>
        </div>
    </div>

    <script>
        let currentPostType = 'sodan'; 
        let currentNameType = 'himitsu'; 
        let currentLoggedInUser = null;
        let isTeacherUser = false;
        let allTeachersList = [];

        function enterApp() {
            auth.signInWithPopup(googleProvider).then((result) => {
                currentLoggedInUser = result.user;
                checkUserRoleAndInit();
            }).catch((error) => {
                showModal("ログインに失敗しました。\n学校のGoogleアカウントで試してね。");
                console.error(error);
            });
        }

        function checkUserRoleAndInit() {
            if(!currentLoggedInUser) return;
            const email = currentLoggedInUser.email;

            fetch(`${GAS_URL}?action=checkRole&email=${encodeURIComponent(email)}`)
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    isTeacherUser = data.isTeacher;
                    allTeachersList = data.teachers || [];
                    
                    document.getElementById('entrance-screen').classList.add('hide');
                    const mainApp = document.getElementById('main-app');
                    mainApp.classList.add('show');

                    const menuTeacher = document.getElementById('menuTeacher');
                    if(isTeacherUser) {
                        menuTeacher.style.display = 'block';
                        document.getElementById('teacherNameDisplay').innerText = currentLoggedInUser.displayName || email;
                    } else {
                        menuTeacher.style.display = 'none';
                    }

                    buildStudentViewTeacherCheckbox();
                    switchView(0); 
                } else {
                    showModal("ユーザー情報の確認に失敗しました。");
                }
            })
            .catch(err => {
                console.error(err);
                showModal("通信エラーが発生しました。");
            });
        }

        function buildStudentViewTeacherCheckbox() {
            const container = document.getElementById('studentViewTeacherList');
            container.innerHTML = '';
            if(allTeachersList.length === 0) {
                container.innerHTML = '<p style="font-size:12px; color:#999;">登録されている先生がいません</p>';
                return;
            }
            allTeachersList.forEach(t => {
                const lbl = document.createElement('label');
                lbl.className = 'checkbox-label';
                lbl.innerHTML = `<input type="checkbox" name="targetTeachers" value="${t.name}"> <span>${t.name} 先生</span>`;
                container.appendChild(lbl);
            });
        }

        function switchView(viewIndex) {
            const panels = document.querySelectorAll('.view-panel');
            panels.forEach(p => p.classList.remove('active'));
            const menus = document.querySelectorAll('.menu-item');
            menus.forEach(m => m.classList.remove('active'));

            const title = document.getElementById('boardTitle');

            if(viewIndex === 'teacher') {
                document.getElementById('panelTeacher').classList.add('active');
                document.getElementById('menuTeacher').classList.add('active');
                title.innerText = "先生管理画面";
                loadTeacherBoard();
            } else {
                document.getElementById(`panel${viewIndex}`).classList.add('active');
                document.getElementById(`menu${viewIndex}`).classList.add('active');
                if(viewIndex === 0) {
                    title.innerText = "つぶやく";
                } else if(viewIndex === 1) {
                    title.innerText = "先生のお返事";
                    loadPersonalReplies();
                } else if(viewIndex === 2) {
                    title.innerText = "みんなの掲示板";
                    loadPublicTimeline();
                }
            }
            
            const sideMenu = document.getElementById('sideMenu');
            if(sideMenu.classList.contains('open')) {
                toggleMenu();
            }
        }

        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('open');
            document.getElementById('menuOverlay').classList.toggle('show');
        }

        function selectPostType(type) {
            currentPostType = type;
            const sodanBox = document.getElementById('typeSodan');
            const hitoriBox = document.getElementById('typeHitorigoto');
            const teacherGrp = document.getElementById('teacherSelectGroup');
            const submitBtn = document.querySelector('.submit-btn');

            if(type === 'sodan') {
                sodanBox.classList.add('selected');
                hitoriBox.classList.remove('selected');
                teacherGrp.style.display = 'block';
                submitBtn.innerText = "🕊️ 先生に届ける";
            } else {
                hitoriBox.classList.add('selected');
                sodanBox.classList.remove('selected');
                teacherGrp.style.display = 'none';
                submitBtn.innerText = "🍃 掲示板に流す";
            }
        }

        function selectNameType(ntype) {
            currentNameType = ntype;
            const btnHimitsu = document.getElementById('nameTypeHimitsu');
            const btnReal = document.getElementById('nameTypeReal');
            if(ntype === 'himitsu') {
                btnHimitsu.classList.add('active');
                btnReal.classList.remove('active');
            } else {
                btnReal.classList.add('active');
                btnHimitsu.classList.remove('active');
            }
        }

        function submitPost() {
            const content = document.getElementById('postContent').value.trim();
            if(!content) {
                showModal("内容はなにか書いてね！");
                return;
            }

            let receivers = [];
            if(currentPostType === 'sodan') {
                const checked = document.querySelectorAll('input[name="targetTeachers"]:checked');
                checked.forEach(c => receivers.push(c.value));
                if(receivers.length === 0) {
                    showModal("だれに届けるか、先生を1人以上えらんでね！");
                    return;
                }
            } else {
                receivers = ["全員(掲示板)"];
            }

            const senderName = (currentNameType === 'real') ? (currentLoggedInUser.displayName || "本名不明") : "ひみつ(匿名)";
            const senderEmail = currentLoggedInUser.email;

            const params = new URLSearchParams();
            params.append('action', 'submitPost');
            params.append('type', currentPostType);
            params.append('sender', senderName);
            params.append('email', senderEmail);
            params.append('receiver', receivers.join(','));
            params.append('content', content);

            showModal("送信中だよ... 🕊️");

            fetch(GAS_URL, {
                method: 'POST',
                body: params
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    showModal("無事に届いたよ！✨");
                    document.getElementById('postContent').value = '';
                    const checked = document.querySelectorAll('input[name="targetTeachers"]:checked');
                    checked.forEach(c => c.checked = false);
                } else {
                    showModal("届けるのに失敗しちゃった。");
                }
            })
            .catch(err => {
                console.error(err);
                showModal("エラーが起きました。");
            });
        }

        function loadPersonalReplies() {
            const board = document.getElementById('personalReplyBoard');
            board.innerHTML = '<p style="text-align:center; font-size:14px; color:#999; padding:20px;">お返事を探しているよ...⏳</p>';
            
            const email = currentLoggedInUser.email;
            fetch(`${GAS_URL}?action=getPersonalPosts&email=${encodeURIComponent(email)}`)
            .then(res => res.json())
            .then(posts => {
                board.innerHTML = '';
                if(posts.length === 0) {
                    board.innerHTML = '<p style="text-align:center; font-size:14px; color:#999; padding:20px;">先生からの個別のお返事はまだ届いていないよ。</p>';
                    return;
                }
                posts.forEach(post => {
                    const card = document.createElement('div');
                    card.className = 'post-card';
                    card.style.borderLeftColor = '#c7b9ff';

                    let repliesHtml = '';
                    if(post.replies && post.replies.length > 0) {
                        post.replies.forEach(rep => {
                            repliesHtml += `
                                <div style="margin-top:15px; background:#fffbf0; border:2px dashed #c7b9ff; padding:12px; border-radius:15px; position:relative;">
                                    <div style="font-size:11px; color:#888; display:flex; justify-content:space-between; margin-bottom:5px;">
                                        <span style="font-weight:bold; color:#a192db;">💌 ${rep.teacher} 先生より</span>
                                        <span>${rep.date}</span>
                                    </div>
                                    <div style="font-size:13.5px; white-space:pre-wrap; line-height:1.5;">${rep.content}</div>
                                </div>
                            `;
                        });
                    } else {
                        repliesHtml = '<p style="font-size:12px; color:#999; margin-top:10px; font-style:italic;">まだお返事はありません</p>';
                    }

                    card.innerHTML = `
                        <div class="post-meta"><span>宛先: ${post.receiver}</span><span>${post.date}</span></div>
                        <div class="post-content" style="font-size:14px; color:#666; border-bottom:1px solid #eee; padding-bottom:10px;">💬 あなたの相談: ${post.content}</div>
                        ${repliesHtml}
                    `;
                    board.appendChild(card);
                });
            })
            .catch(err => {
                console.error(err);
                board.innerHTML = '<p style="text-align:center; color:red; font-size:13px;">読み込みエラーが起きました。</p>';
            });
        }

        function loadPublicTimeline() {
            const board = document.getElementById('publicTimelineBoard');
            board.innerHTML = '<p style="text-align:center; font-size:14px; color:#999; padding:20px;">みんなのつぶやきを集めてるよ...⏳</p>';

            fetch(`${GAS_URL}?action=getPublicPosts`)
            .then(res => res.json())
            .then(posts => {
                board.innerHTML = '';
                if(posts.length === 0) {
                    board.innerHTML = '<p style="text-align:center; font-size:14px; color:#999; padding:20px;">まだ掲示板へのつぶやきはないみたい。</p>';
                    return;
                }
                posts.forEach(post => {
                    const card = document.createElement('div');
                    card.className = 'post-card';
                    card.innerHTML = `
                        <div class="post-meta"><span>👤 ${post.sender}</span><span>${post.date}</span></div>
                        <div class="post-content">${post.content}</div>
                    `;
                    board.appendChild(card);
                });
            })
            .catch(err => {
                console.error(err);
                board.innerHTML = '<p style="text-align:center; color:red; font-size:13px;">読み込みエラーが起きました。</p>';
            });
        }

        function loadTeacherBoard() {
            const tBoard = document.getElementById('teacherManagementBoard');
            tBoard.innerHTML = '<p style="text-align:center; font-size:14px; color:#999; padding:20px;">担当の相談を読み込み中...⏳</p>';

            fetch(`${GAS_URL}?action=getTeacherView`)
            .then(res => res.json())
            .then(posts => {
                tBoard.innerHTML = '';
                
                let myTeacherObj = allTeachersList.find(t => t.email.toLowerCase() === currentLoggedInUser.email.toLowerCase());
                let myName = myTeacherObj ? myTeacherObj.name : "";

                if(!myName) {
                    tBoard.innerHTML = '<p style="text-align:center; color:red; padding:10px;">【警告】あなたはスプレッドシートの「先生マスタ」に名前が登録されていません。</p>';
                    return;
                }

                posts.forEach(post => {
                    let targetArray = post.receiver.split(',');
                    if(targetArray.includes(myName)) {
                        const tCard = document.createElement('div');
                        tCard.className = 'post-card';
                        tCard.style.borderLeft = '8px solid #c7b9ff';

                        let tRepliesHtml = '';
                        if(post.replies && post.replies.length > 0) {
                            post.replies.forEach(rep => {
                                tRepliesHtml += `
                                    <div style="margin-top:10px; background:#fffbf2; border:1px solid #c7b9ff; padding:8px 12px; border-radius:12px; font-size:13px;">
                                        <div style="font-size:11px; color:#777; font-weight:bold;">↳ ${rep.teacher} 先生 (${rep.date}):</div>
                                        <div style="white-space:pre-wrap; margin-top:3px;">${rep.content}</div>
                                    </div>
                                `;
                            });
                        }

                        tCard.innerHTML = `
                            <div class="post-meta"><span style="color:#a192db; font-weight:bold;">宛先: ${post.receiver}</span><span>${post.date}</span></div>
                            <div style="font-weight:bold; margin-bottom:10px; font-size:14px;">👤 送ってくれた生徒: ${post.sender}</div>
                            <div class="post-content" style="background: #fafafa; padding: 10px; border-radius: 10px;">${post.content}</div>
                            ${tRepliesHtml}
                            <div style="margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 10px;">
                                <textarea id=\"replyText-${post.id}\" placeholder=\"この生徒にお返事やメッセージを書く...\" style=\"height: 60px; font-size: 13px; padding: 8px; border-radius: 10px;\"></textarea>
                                <button onclick=\"submitTeacherReply(${post.id})\" style=\"background: #c7b9ff; color: #4a3b32; border: 2px solid #4a3b32; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-top: 6px; cursor: pointer;\">💌 生徒にお返事を届ける</button>
                            </div>
                        `;
                        tBoard.appendChild(tCard);
                    }
                });
                if(tBoard.innerHTML === '') {
                    tBoard.innerHTML = '<p style="text-align:center; font-size:14px; color:#999; padding:20px;">あなた宛ての相談は現在ありません。</p>';
                }
            })
            .catch(err => {
                console.error(err);
                tBoard.innerHTML = '<p style="text-align:center; color:red; font-size:13px;">管理データの取得に失敗しました。</p>';
            });
        }

        function submitTeacherReply(postId) {
            const textarea = document.getElementById(`replyText-${postId}`);
            const replyContent = textarea.value.trim();
            if(!replyContent) {
                showModal("お返事の内容を入力してください。");
                return;
            }

            let myTeacherObj = allTeachersList.find(t => t.email.toLowerCase() === currentLoggedInUser.email.toLowerCase());
            let teacherName = myTeacherObj ? myTeacherObj.name : "先生";

            const params = new URLSearchParams();
            params.append('action', 'submitReply');
            params.append('postId', postId);
            params.append('teacher', teacherName);
            params.append('content', replyContent);

            showModal("送信中...");

            fetch(GAS_URL, {
                method: 'POST',
                body: params
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    showModal("お返事を登録しました！");
                    loadTeacherBoard();
                } else {
                    showModal("お返事の登録に失敗しました。");
                }
            })
            .catch(err => {
                console.error(err);
                showModal("エラーが発生しました。");
            });
        }

        function handleLogout() {
            auth.signOut().then(() => {
                currentLoggedInUser = null;
                isTeacherUser = false;
                document.getElementById('main-app').classList.remove('show');
                document.getElementById('entrance-screen').classList.remove('hide');
                showModal("ログアウトしたよ。またね！");
            }).catch(err => {
                console.error(err);
            });
        }

        function showModal(msg) {
            document.getElementById('modalMessage').innerText = msg;
            document.getElementById('customModal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('customModal').style.display = 'none';
        }
    </script>
</body>
</html>
